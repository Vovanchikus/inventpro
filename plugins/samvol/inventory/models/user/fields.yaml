                pending: Pending
                approved: Approved
                rejected: Rejected
        organization_approved_at:
            tab: Organization
            label: Approved At
            type: datepicker
            mode: datetime
            disabled: true
            span: auto
        organization_approved_by:
            tab: Organization
            label: Approved By (user ID)
            type: number
            disabled: true
            span: auto
